<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro</title>
    <script type="module" src="/src/main.ts" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="titlebar" class="titlebar">
      <div class="controls">
        <button id="dnd-button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              d="m15 8l-3-3l3-3l3 3zm5 3l-2-2l2-2l2 2zm-7.925 11q-2.1 0-3.937-.8t-3.2-2.162t-2.163-3.2t-.8-3.938q0-3.65 2.325-6.437T10.225 2q-.45 2.475.275 4.838t2.5 4.137t4.138 2.5t4.837.275q-.65 3.6-3.45 5.925T12.075 22m0-2q2.2 0 4.075-1.1t2.95-3.025q-2.15-.2-4.075-1.088t-3.45-2.412t-2.425-3.45T8.075 4.85Q6.15 5.925 5.063 7.813T3.975 11.9q0 3.375 2.363 5.738T12.075 20m-.5-7.625"
            />
          </svg>
        </button>
        <button id="dnd-button-active" class="hidden">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              d="m15 8l-3-3l3-3l3 3zm5 3l-2-2l2-2l2 2zm-7.925 11q-2.1 0-3.937-.8t-3.2-2.162t-2.163-3.2t-.8-3.938q0-3.65 2.325-6.437T10.225 2q-.45 2.475.275 4.838t2.5 4.137t4.138 2.5t4.837.275q-.65 3.6-3.45 5.925T12.075 22"
            />
          </svg>
        </button>
        <button id="pin-disabled" title="pin">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              fill-rule="evenodd"
              d="M9 4a.5.5 0 0 0 0 1h1c.289 0 .534.281.495.568l-.75 5.5a.5.5 0 0 1-.425.427c-1.352.193-2.286 1.247-2.678 2.505h10.716c-.392-1.258-1.327-2.312-2.679-2.505a.5.5 0 0 1-.425-.427l-.75-5.5A.516.516 0 0 1 14 5h1a.5.5 0 0 0 0-1zm-1.5.5A1.5 1.5 0 0 1 9 3h6a1.5 1.5 0 0 1 0 3h-.427l.624 4.577c1.826.441 2.938 2.05 3.293 3.825A.505.505 0 0 1 18 15H6a.505.505 0 0 1-.49-.598c.355-1.775 1.466-3.384 3.293-3.825L9.427 6H9a1.5 1.5 0 0 1-1.5-1.5M12 16a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 1 .5-.5"
              clip-rule="evenodd"
            />
          </svg>
        </button>
        <button id="pin-activated" class="hidden" title="pin">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              d="M7.25 4.5c0-.966.784-1.75 1.75-1.75h6c.967 0 1.75.784 1.75 1.75c0 1.063-.89 1.75-1.89 1.75l.562 4.128c1.835.52 2.951 2.165 3.314 3.975a.758.758 0 0 1-.736.897H6a.758.758 0 0 1-.735-.897c.362-1.81 1.478-3.454 3.313-3.975l.563-4.128c-1.002 0-1.89-.687-1.89-1.75m5.499 12a.75.75 0 0 0-1.5 0v4a.75.75 0 1 0 1.5 0z"
            />
          </svg>
        </button>
        <button id="titlebar-minimize" title="minimize">
          <!-- https://api.iconify.design/mdi:window-minimize.svg -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path fill="currentColor" d="M19 13H5v-2h14z" />
          </svg>
        </button>
        <button id="titlebar-close" title="close">
          <!-- https://api.iconify.design/mdi:close.svg -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              d="M13.46 12L19 17.54V19h-1.46L12 13.46L6.46 19H5v-1.46L10.54 12L5 6.46V5h1.46L12 10.54L17.54 5H19v1.46z"
            />
          </svg>
        </button>
      </div>
    </div>
    <main class="container">
      <div class="pomodoro-timer">
        <div class="pomodoro-timer-controls">
          <button class="start" id="btn-start">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-play-icon lucide-play"
            >
              <path
                d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"
              />
            </svg>
          </button>
          <button class="resume hidden" id="btn-resume">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-pause-icon lucide-pause"
            >
              <rect x="14" y="3" width="5" height="18" rx="1" />
              <rect x="5" y="3" width="5" height="18" rx="1" />
            </svg>
          </button>
        </div>
        <div class="pomodoro-timer-display">
          <p class="pomodoro-timer-display-time" id="time-left">25:00</p>
          <!-- 25 minutes in seconds -->
        </div>
      </div>
      <div id="statistics">
        <div class="statistics-info">
          <p>Pomodoro Cycles</p>
          <p id="pomodoro-cycle">0</p>
        </div>
        <div class="statistics-info">
          <p>Next Break</p>
          <p id="next-break">Short</p>
        </div>
      </div>
      <div id="media-widget">
        <div class="media-info animate-wraper">
          <span id="track-title" class="sliding-element"></span>
          <span id="track-artist"></span>
        </div>
        <div>
          <div class="media-time-info">
            <p id="progress-bar-time"></p>
            <div id="progress-container">
              <div id="progress-bar"></div>
            </div>
            <p id="progress-bar-duration"></p>
          </div>
          <div class="media-controls">
            <img src="src\assets\forward.png" class="icons" id="rewind" />
            <img src="src\assets\play.png" class="icons" id="play" />
            <img src="src\assets\pause.png" class="icons" id="pause" />
            <img src="src\assets\forward.png" class="icons" id="forward" />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
