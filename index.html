<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro</title>
    <script type="module" src="/src/main.ts" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="titlebar" class="titlebar">
      <div class="controls">
        <button id="titlebar-minimize" title="minimize">
          <!-- https://api.iconify.design/mdi:window-minimize.svg -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path fill="currentColor" d="M19 13H5v-2h14z" />
          </svg>
        </button>
        <button id="titlebar-close" title="close">
          <!-- https://api.iconify.design/mdi:close.svg -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              d="M13.46 12L19 17.54V19h-1.46L12 13.46L6.46 19H5v-1.46L10.54 12L5 6.46V5h1.46L12 10.54L17.54 5H19v1.46z"
            />
          </svg>
        </button>
      </div>
    </div>
    <main class="container">
      <div class="pomodoro-timer">
        <div class="pomodoro-timer-controls">
          <button class="start" id="btn-start">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-play-icon lucide-play"
            >
              <path
                d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"
              />
            </svg>
          </button>
          <button class="resume hidden" id="btn-resume">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-pause-icon lucide-pause"
            >
              <rect x="14" y="3" width="5" height="18" rx="1" />
              <rect x="5" y="3" width="5" height="18" rx="1" />
            </svg>
          </button>
        </div>
        <div class="pomodoro-timer-display">
          <p class="pomodoro-timer-display-time" id="time-left">25:00</p>
          <!-- 25 minutes in seconds -->
        </div>
      </div>
      <div id="statistics">
        <div class="statistics-info">
          <p>Pomodoro Cycles</p>
          <p id="pomodoro-cycle">0</p>
        </div>
        <div class="statistics-info">
          <p>Next Break</p>
          <p id="next-break">Short</p>
        </div>
      </div>
      <div id="media-widget">
        <div class="media-info animate-wraper">
          <span id="track-title" class="sliding-element"></span>
          <span id="track-artist"></span>
        </div>
        <div>
          <div class="media-time-info">
            <p id="progress-bar-time"></p>
            <div id="progress-container">
              <div id="progress-bar"></div>
            </div>
            <p id="progress-bar-duration"></p>
          </div>
          <div class="media-controls">
            <img src="src\assets\forward.png" class="icons" id="rewind" />
            <img src="src\assets\play.png" class="icons" id="play" />
            <img src="src\assets\pause.png" class="icons" id="pause" />
            <img src="src\assets\forward.png" class="icons" id="forward" />
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
